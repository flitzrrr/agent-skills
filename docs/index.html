<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Skills Hub</title>
  <meta name="description" content="127 curated AI agent skills from 15 sources. Compatible with Claude Code, Codex, Cursor, Antigravity, and more.">
  <meta property="og:title" content="Agent Skills Hub">
  <meta property="og:description" content="127 curated AI agent skills from 15 sources.">
  <meta property="og:image" content="https://raw.githubusercontent.com/flitzrrr/agent-skills/main/.github/social-preview.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      line-height: 1.6;
    }
    .container { max-width: 960px; margin: 0 auto; padding: 2rem; }

    header {
      text-align: center;
      padding: 4rem 0 2rem;
      border-bottom: 1px solid #21262d;
    }
    header h1 { color: #f0f6fc; font-size: 2.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    header p { color: #8b949e; font-size: 1.1rem; }
    .badges { margin-top: 1rem; display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; }
    .badges img { height: 20px; }

    .install {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 1.5rem;
      margin: 2rem 0;
      text-align: center;
    }
    .install code {
      background: #0d1117;
      color: #79c0ff;
      padding: 0.5rem 1rem;
      border-radius: 4px;
      font-size: 1rem;
      display: inline-block;
    }
    .install p { margin-bottom: 0.75rem; color: #8b949e; }

    .search-box {
      margin: 2rem 0 1rem;
      display: flex;
      justify-content: center;
    }
    .search-box input {
      width: 100%;
      max-width: 500px;
      padding: 0.75rem 1rem;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-size: 1rem;
      outline: none;
    }
    .search-box input:focus { border-color: #58a6ff; }
    .search-box input::placeholder { color: #484f58; }

    .stats {
      display: flex;
      gap: 2rem;
      justify-content: center;
      margin: 2rem 0;
      flex-wrap: wrap;
    }
    .stat {
      text-align: center;
      padding: 1rem 2rem;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      min-width: 140px;
    }
    .stat-value { font-size: 2rem; font-weight: 700; color: #f0f6fc; }
    .stat-label { color: #8b949e; font-size: 0.85rem; }

    h2 {
      color: #f0f6fc;
      font-size: 1.3rem;
      margin: 2rem 0 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #21262d;
    }

    .skill-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 0.75rem;
    }
    .skill-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 0.75rem 1rem;
      transition: border-color 0.2s;
    }
    .skill-card:hover { border-color: #58a6ff; }
    .skill-name {
      color: #58a6ff;
      font-family: monospace;
      font-size: 0.9rem;
    }
    .skill-source { color: #484f58; font-size: 0.75rem; }

    footer {
      text-align: center;
      padding: 3rem 0 2rem;
      color: #484f58;
      font-size: 0.85rem;
      border-top: 1px solid #21262d;
      margin-top: 3rem;
    }
    footer a { color: #58a6ff; text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Agent Skills Hub</h1>
      <p>Curated AI agent skills. Compatible with all major coding assistants.</p>
      <div class="badges">
        <img src="https://img.shields.io/npm/v/@flitzrrr/agent-skills?style=flat-square&color=cb3837" alt="npm version">
        <img src="https://img.shields.io/npm/dm/@flitzrrr/agent-skills?style=flat-square" alt="npm downloads">
        <img src="https://img.shields.io/badge/license-MIT-blue?style=flat-square" alt="license">
      </div>
    </header>

    <div class="install">
      <p>Quick install</p>
      <code>npx @flitzrrr/agent-skills install</code>
    </div>

    <div class="stats" id="stats"></div>

    <div class="search-box">
      <input type="text" id="search" placeholder="Search skills..." autocomplete="off">
    </div>

    <div id="catalog"></div>

    <footer>
      <a href="https://github.com/flitzrrr/agent-skills">GitHub</a> &middot;
      <a href="https://www.npmjs.com/package/@flitzrrr/agent-skills">npm</a> &middot;
      <a href="https://github.com/flitzrrr/agent-skills/discussions">Discussions</a>
    </footer>
  </div>

  <script>
    const SKILLS_API = "https://api.github.com/repos/flitzrrr/agent-skills/contents/skills";

    async function loadSkills() {
      try {
        const res = await fetch(SKILLS_API);
        const data = await res.json();
        const skills = data
          .filter(f => f.type === "dir" || f.type === "symlink")
          .map(f => f.name)
          .sort();

        // Stats
        const sources = new Set(skills.map(s => s.split("-")[0]));
        document.getElementById("stats").innerHTML = `
          <div class="stat"><div class="stat-value">${skills.length}</div><div class="stat-label">Skills</div></div>
          <div class="stat"><div class="stat-value">${sources.size}</div><div class="stat-label">Sources</div></div>
          <div class="stat"><div class="stat-value">6</div><div class="stat-label">Platforms</div></div>
        `;

        // Render
        renderSkills(skills);

        // Search
        document.getElementById("search").addEventListener("input", (e) => {
          const q = e.target.value.toLowerCase();
          renderSkills(skills.filter(s => s.includes(q)));
        });
      } catch {
        document.getElementById("catalog").innerHTML = "<p>Failed to load skills. Check the <a href='https://github.com/flitzrrr/agent-skills'>GitHub repo</a> directly.</p>";
      }
    }

    function renderSkills(skills) {
      const groups = {};
      skills.forEach(s => {
        const prefix = s.split("-")[0];
        if (!groups[prefix]) groups[prefix] = [];
        groups[prefix].push(s);
      });

      let html = "";
      for (const [source, items] of Object.entries(groups).sort()) {
        html += `<h2>${source} (${items.length})</h2><div class="skill-grid">`;
        items.forEach(s => {
          html += `<div class="skill-card"><span class="skill-name">${s}</span></div>`;
        });
        html += "</div>";
      }
      document.getElementById("catalog").innerHTML = html;
    }

    loadSkills();
  </script>
</body>
</html>
