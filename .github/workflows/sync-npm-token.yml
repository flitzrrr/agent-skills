name: "Sync NPM_TOKEN to frontend-design-skills"

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Set NPM_TOKEN on frontend-design-skills
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          gh secret set NPM_TOKEN --repo flitzrrr/frontend-design-skills --body "$NPM_TOKEN"
          echo "NPM_TOKEN synced to flitzrrr/frontend-design-skills"
