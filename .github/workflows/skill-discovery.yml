name: "Weekly Skill Auto-Discovery"

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  discover-and-add:
    name: Discover and Add Skills
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Discover trending skill repos
        id: discover
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Searching for trending agent skill repos..."
          EXISTING=$(git submodule status | awk '{print $2}' | xargs -I{} basename {} | sort)
          echo "existing=$EXISTING" >> $GITHUB_OUTPUT

          TRENDING=$(gh api "search/repositories?q=SKILL.md+in:path+pushed:>$(date -d '7 days ago' +%Y-%m-%d)&sort=stars&per_page=20" \
            --jq '.items[] | select(.stargazers_count > 50) | {name: .full_name, stars: .stargazers_count, url: .html_url, desc: .description}' 2>/dev/null || echo "")

          TOP=$(gh api "search/repositories?q=agent+skills+in:name+topic:agent-skills&sort=stars&per_page=20" \
            --jq '.items[] | select(.stargazers_count > 100) | {name: .full_name, stars: .stargazers_count, url: .html_url, desc: .description}' 2>/dev/null || echo "")

          echo "$TRENDING" "$TOP" | jq -s 'unique_by(.name) | sort_by(-.stars) | .[0:10]' > /tmp/candidates.json
          cat /tmp/candidates.json
          echo "candidates_file=/tmp/candidates.json" >> $GITHUB_OUTPUT

      - name: Evaluate and scan candidates
        id: evaluate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ADDED=""
          REPORT=""
          SCANNED=0
          ACCEPTED=0

          while IFS= read -r repo_name; do
            [ -z "$repo_name" ] && continue

            echo "Evaluating: $repo_name"

            BASENAME=$(echo "$repo_name" | tr '/' '-')
            if git submodule status | grep -q "$BASENAME"; then
              echo "  Already exists, skipping"
              continue
            fi

            SKILL_COUNT=$(gh api "search/code?q=filename:SKILL.md+repo:$repo_name" --jq '.total_count' 2>/dev/null || echo "0")
            if [ "$SKILL_COUNT" -lt 3 ]; then
              echo "  Only $SKILL_COUNT SKILL.md files (min 3), skipping"
              REPORT="${REPORT}\n| SKIP | [$repo_name](https://github.com/$repo_name) | - | $SKILL_COUNT | - | Below skill count (min 3) |"
              continue
            fi

            STARS=$(gh api "repos/$repo_name" --jq '.stargazers_count' 2>/dev/null || echo "0")
            LICENSE=$(gh api "repos/$repo_name" --jq '.license.spdx_id // "No license"' 2>/dev/null || echo "Unknown")

            if [ "$STARS" -lt 50 ]; then
              echo "  Only $STARS stars (min 50), skipping"
              REPORT="${REPORT}\n| SKIP | [$repo_name](https://github.com/$repo_name) | $STARS | $SKILL_COUNT | $LICENSE | Below star threshold (min 50) |"
              continue
            fi

            SCANNED=$((SCANNED + 1))
            echo "  Security scanning..."

            TMPDIR=$(mktemp -d)
            git clone --depth 1 "https://github.com/$repo_name.git" "$TMPDIR/$BASENAME" 2>/dev/null

            SCAN_PASS=true
            SCAN_NOTES=""

            OBFUSCATED=$(grep -rl "eval\|exec\|__import__\|subprocess\.call\|os\.system" "$TMPDIR/$BASENAME" --include="*.py" --include="*.js" 2>/dev/null | wc -l)
            if [ "$OBFUSCATED" -gt 3 ]; then
              SCAN_PASS=false
              SCAN_NOTES="${SCAN_NOTES}$OBFUSCATED files with suspicious code. "
            fi

            CREDS=$(grep -rl "password\|api_key\|secret_key\|private_key" "$TMPDIR/$BASENAME" --include="*.json" --include="*.env" 2>/dev/null | wc -l)
            if [ "$CREDS" -gt 0 ]; then
              SCAN_PASS=false
              SCAN_NOTES="${SCAN_NOTES}$CREDS files with credential patterns. "
            fi

            EXEC_COUNT=$(find "$TMPDIR/$BASENAME" -type f -executable ! -name "*.sh" ! -path "*/.git/*" | wc -l)
            if [ "$EXEC_COUNT" -gt 5 ]; then
              SCAN_NOTES="${SCAN_NOTES}$EXEC_COUNT executable files. "
            fi

            TOTAL_FILES=$(find "$TMPDIR/$BASENAME" -type f ! -path "*/.git/*" | wc -l)
            MD_FILES=$(find "$TMPDIR/$BASENAME" -name "*.md" ! -path "*/.git/*" | wc -l)
            MD_RATIO=0
            if [ "$TOTAL_FILES" -gt 0 ]; then
              MD_RATIO=$((MD_FILES * 100 / TOTAL_FILES))
            fi

            rm -rf "$TMPDIR"

            if [ "$SCAN_PASS" = false ]; then
              echo "  FAILED security scan: $SCAN_NOTES"
              REPORT="${REPORT}\n| FAIL | [$repo_name](https://github.com/$repo_name) | $STARS | $SKILL_COUNT | $LICENSE | Scan failed: $SCAN_NOTES |"
              continue
            fi

            if [ "$MD_RATIO" -lt 30 ]; then
              echo "  Markdown ratio too low ($MD_RATIO%%, min 30%%), skipping"
              REPORT="${REPORT}\n| SKIP | [$repo_name](https://github.com/$repo_name) | $STARS | $SKILL_COUNT | $LICENSE | Markdown ratio $MD_RATIO%% (min 30%%) |"
              continue
            fi

            echo "  PASSED ($STARS stars, $SKILL_COUNT skills, $LICENSE, $MD_RATIO%% markdown)"
            ACCEPTED=$((ACCEPTED + 1))

            git submodule add "https://github.com/$repo_name.git" "vendor/$BASENAME" 2>/dev/null || true

            SKILL_DIRS=$(find "vendor/$BASENAME" -name "SKILL.md" -maxdepth 3 -exec dirname {} \; 2>/dev/null)
            for skill_dir in $SKILL_DIRS; do
              skill_name=$(basename "$skill_dir")
              prefix=$(echo "$BASENAME" | cut -d'-' -f1)
              ln -sf "../../$skill_dir" "skills/${prefix}-${skill_name}" 2>/dev/null || true
            done

            ADDED="${ADDED}${repo_name} "
            REPORT="${REPORT}\n| ADDED | [$repo_name](https://github.com/$repo_name) | $STARS | $SKILL_COUNT | $LICENSE | Passed (${MD_RATIO}%% markdown) |"

          done < <(jq -r '.[].name' /tmp/candidates.json 2>/dev/null)

          echo "added=$ADDED" >> $GITHUB_OUTPUT
          echo "scanned=$SCANNED" >> $GITHUB_OUTPUT
          echo "accepted=$ACCEPTED" >> $GITHUB_OUTPUT
          echo "report<<EOF" >> $GITHUB_OUTPUT
          echo -e "$REPORT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Sync documentation
        if: steps.evaluate.outputs.accepted != '0'
        run: node bin/sync-docs.js

      - name: Commit and push
        if: steps.evaluate.outputs.accepted != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(auto): add ${{ steps.evaluate.outputs.accepted }} new skill source(s)

          Auto-discovered and security-scanned by weekly pipeline.
          Sources added: ${{ steps.evaluate.outputs.added }}" || exit 0
          git push origin main

      - name: Bump npm version
        if: steps.evaluate.outputs.accepted != '0'
        run: |
          npm version patch --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          git add package.json
          git commit -m "chore: release v$VERSION"
          git tag "v$VERSION"
          git push origin main --tags

      - name: Create report issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="Weekly Skill Discovery Report - $(date +%Y-%m-%d)"
          BODY=$(cat <<'ISSUE_BODY'
          ## Skill Discovery Report

          **Scanned:** ${{ steps.evaluate.outputs.scanned }} candidates
          **Accepted:** ${{ steps.evaluate.outputs.accepted }} new sources
          **Added:** ${{ steps.evaluate.outputs.added || 'None' }}

          ### Quality Gates

          | Gate | Threshold |
          |------|-----------|
          | Minimum stars | 50 |
          | Minimum SKILL.md files | 3 |
          | Minimum markdown ratio | 30% |
          | No obfuscated code | eval/exec/subprocess |
          | No hardcoded credentials | passwords, API keys |
          | Executable file limit | max 5 |

          ### Candidate Results

          | Status | Repository | Stars | Skills | License | Notes |
          |--------|-----------|-------|--------|---------|-------|
          ${{ steps.evaluate.outputs.report }}
          ISSUE_BODY
          )

          gh issue create --title "$TITLE" --body "$BODY" --label "automation"
