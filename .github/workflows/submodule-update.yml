name: "Weekly Vendor Submodule Update"

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-submodules:
    name: Update Vendor Submodules
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch and check for updates
        id: check
        run: |
          UPDATED=""
          REPORT=""
          COUNT=0

          for submodule in vendor/*/; do
            [ ! -d "${submodule}/.git" ] && [ ! -f "${submodule}/.git" ] && continue
            name="$(basename "${submodule}")"

            cd "${submodule}"
            git fetch origin 2>/dev/null || true

            LOCAL="$(git rev-parse HEAD)"
            REMOTE="$(git rev-parse origin/main 2>/dev/null || git rev-parse origin/master 2>/dev/null || echo "")"

            if [ -z "${REMOTE}" ]; then
              REPORT="${REPORT}| ${name} | no remote branch | - | - |\n"
              cd "${GITHUB_WORKSPACE}"
              continue
            fi

            if [ "${LOCAL}" != "${REMOTE}" ]; then
              COMMIT_COUNT="$(git log --oneline "HEAD..${REMOTE}" 2>/dev/null | wc -l | tr -d ' ')"
              FIRST_LINE="$(git log --oneline "HEAD..${REMOTE}" 2>/dev/null | head -1)"

              DEFAULT_BRANCH="$(git rev-parse --abbrev-ref origin/HEAD 2>/dev/null | sed 's|origin/||' || echo "main")"
              git checkout "${DEFAULT_BRANCH}" 2>/dev/null || true
              git pull origin "${DEFAULT_BRANCH}" 2>/dev/null || true

              UPDATED="${UPDATED}${name} "
              COUNT=$((COUNT + 1))
              REPORT="${REPORT}| ${name} | updated | ${COMMIT_COUNT} commits | ${FIRST_LINE} |\n"
            fi

            cd "${GITHUB_WORKSPACE}"
          done

          {
            echo "updated=${UPDATED}"
            echo "count=${COUNT}"
            echo "report<<EOF"
            echo -e "${REPORT}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Commit submodule updates
        if: steps.check.outputs.count != '0'
        env:
          UPDATE_COUNT: ${{ steps.check.outputs.count }}
          UPDATE_LIST: ${{ steps.check.outputs.updated }}
        run: |
          git add -A vendor/
          git commit -m "chore(vendor): update ${UPDATE_COUNT} submodule(s) to latest upstream [$(date +%Y-%m-%d)]

          Submodules: ${UPDATE_LIST}"

      - name: Rebuild symlinks for updated submodules
        if: steps.check.outputs.count != '0'
        run: |
          for submodule in ${{ steps.check.outputs.updated }}; do
            VENDOR_PATH="vendor/${submodule}"
            [ ! -d "${VENDOR_PATH}" ] && continue

            # Remove existing symlinks pointing to this vendor
            find skills/ -type l | while read -r link; do
              target="$(readlink "${link}" 2>/dev/null || true)"
              if echo "${target}" | grep -q "${submodule}"; then
                rm -f "${link}"
              fi
            done

            # Recreate symlinks for all SKILL.md directories
            find "${VENDOR_PATH}" -name "SKILL.md" -maxdepth 4 -exec dirname {} \; | while read -r skill_dir; do
              skill_name="$(basename "${skill_dir}")"
              prefix="$(echo "${submodule}" | cut -d'-' -f1)"
              ln -sf "../../${skill_dir}" "skills/${prefix}-${skill_name}" 2>/dev/null || true
            done
          done

          git add -A skills/
          git diff --cached --quiet || git commit -m "chore: rebuild symlinks for updated submodules"

      - name: Sync documentation
        if: steps.check.outputs.count != '0'
        run: |
          node bin/sync-docs.js
          node bin/build-catalog.js
          git add -A docs/ README.md AGENTS.md CLAUDE.md .cursorrules CHEATSHEET.md 2>/dev/null || true
          git diff --cached --quiet || git commit -m "docs: update skill catalog and docs [$(date +%Y-%m-%d)]"

      - name: Push to main
        if: steps.check.outputs.count != '0'
        run: git push origin main

      - name: Report no updates
        if: steps.check.outputs.count == '0'
        run: echo "All vendor submodules are already up to date."
