name: "Weekly Vendor Submodule Update"

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-submodules:
    name: Update Vendor Submodules
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch and check for updates
        id: check
        run: |
          UPDATED=""
          REPORT=""
          COUNT=0

          for submodule in vendor/*/; do
            [ ! -d "${submodule}/.git" ] && [ ! -f "${submodule}/.git" ] && continue
            name="$(basename "${submodule}")"

            cd "${submodule}"
            git fetch origin 2>/dev/null || true

            LOCAL="$(git rev-parse HEAD)"
            REMOTE="$(git rev-parse origin/main 2>/dev/null || git rev-parse origin/master 2>/dev/null || echo "")"

            if [ -z "${REMOTE}" ]; then
              REPORT="${REPORT}| ${name} | no remote branch | - | - |
          "
              cd "${GITHUB_WORKSPACE}"
              continue
            fi

            if [ "${LOCAL}" != "${REMOTE}" ]; then
              COMMIT_COUNT="$(git log --oneline "HEAD..${REMOTE}" 2>/dev/null | wc -l | tr -d ' ')"
              FIRST_LINE="$(git log --oneline "HEAD..${REMOTE}" 2>/dev/null | head -1)"

              DEFAULT_BRANCH="$(git rev-parse --abbrev-ref origin/HEAD 2>/dev/null | sed 's|origin/||' || echo "main")"
              git checkout "${DEFAULT_BRANCH}" 2>/dev/null || true
              git pull origin "${DEFAULT_BRANCH}" 2>/dev/null || true

              UPDATED="${UPDATED}${name} "
              COUNT=$((COUNT + 1))
              REPORT="${REPORT}| ${name} | updated | ${COMMIT_COUNT} commits | ${FIRST_LINE} |
          "
            fi

            cd "${GITHUB_WORKSPACE}"
          done

          {
            echo "updated=${UPDATED}"
            echo "count=${COUNT}"
            echo "report<<EOF"
            echo "${REPORT}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Stage submodule changes
        if: steps.check.outputs.count != '0'
        run: git add -A vendor/

      - name: Create PR
        if: steps.check.outputs.count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPDATE_COUNT: ${{ steps.check.outputs.count }}
          UPDATE_LIST: ${{ steps.check.outputs.updated }}
          UPDATE_REPORT: ${{ steps.check.outputs.report }}
        run: |
          BRANCH="chore/auto-update-submodules-$(date +%Y-%m-%d)"
          git checkout -b "${BRANCH}"
          git commit -m "chore: update ${UPDATE_COUNT} vendor submodule(s) to latest upstream

          Auto-updated by weekly pipeline.
          Submodules: ${UPDATE_LIST}"

          git push origin "${BRANCH}"

          {
            echo "## Automated Vendor Submodule Update"
            echo ""
            echo "| Submodule | Status | Changes | Latest Commit |"
            echo "|-----------|--------|---------|---------------|"
            echo "${UPDATE_REPORT}"
            echo ""
            echo "---"
            echo "*Auto-generated by the weekly submodule update workflow.*"
          } > /tmp/pr_body.md

          gh pr create \
            --title "chore: update ${UPDATE_COUNT} vendor submodule(s) [$(date +%Y-%m-%d)]" \
            --body-file /tmp/pr_body.md \
            --base main \
            --head "${BRANCH}" \
            --label "automation" || echo "PR creation failed"

      - name: Report no updates
        if: steps.check.outputs.count == '0'
        run: echo "All vendor submodules are already up to date."
